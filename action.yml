name: "Check Workflow Concurrency"
description: "Warn if the current workflow does not have concurrency configured"

inputs:
  github_token:
    description: "GitHub token"
    required: true

runs:
  using: "composite"
  steps:
    - name: Check workflow concurrency
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        echo "Checking workflow concurrency configuration..."

        RESPONSE=$(curl -s \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }})

        CONCURRENCY=$(echo "$RESPONSE" | jq -r '.concurrency')

        if [ "$CONCURRENCY" = "null" ] || [ -z "$CONCURRENCY" ]; then
          echo "::warning title=Missing Concurrency::This workflow does not define a concurrency group."
        else
          echo "Concurrency group detected: $CONCURRENCY"
        fi
